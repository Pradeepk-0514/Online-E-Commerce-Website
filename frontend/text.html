<!DOCTYPE html>
<html>
<head>
    <title>Simple E-Commerce Platform</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#1e3a8a;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background:#333;
            padding:10px;
            text-align:center;
        }

        nav input{
            width:300px;
            padding:10px;
        }

        .products{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            padding:30px;
        }

        .card{
            background:white;
            width:250px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            padding:20px;
            text-align:center;
        }

        .card img{
            width:200px;
            height:200px;
            object-fit:cover;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        footer{
            background:#1e3a8a;
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>

<body>

<header>

    <h1>My E-Commerce Store</h1>

</header>

<nav>

    <input type="text" placeholder="Search products">

</nav>

<section class="products">

    <div class="card">

        <img src="https://via.placeholder.com/200">

        <h3>Smartphone</h3>

        <p>₹15,999</p>

        <button>Add to Cart</button>

    </div>

    <div class="card">

        <img src="https://via.placeholder.com/200">

        <h3>Headphones</h3>

        <p>₹1,999</p>

        <button>Add to Cart</button>

    </div>

    <div class="card">

        <img src="https://via.placeholder.com/200">

        <h3>Laptop</h3>

        <p>₹59,999</p>

        <button>Add to Cart</button>

    </div>

</section>

<footer>

    <p>© 2026 My E-Commerce Store</p>

</footer>

</body>

</html>
